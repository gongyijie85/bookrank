{% extends "mobile/base.html" %}

{% block title %}{{ _('搜索') }} - 书榜{% endblock %}

{% block header %}
<header class="m-header">
    <a href="/" class="m-header-btn" aria-label="{{ _('返回') }}">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <span class="m-header-title">{{ _('搜索书籍') }}</span>
    <div class="m-header-placeholder"></div>
</header>
{% endblock %}

{% block content %}

<!-- 搜索表单 -->
<form action="/" method="get" style="padding:var(--space-4)">
    <div style="display:flex;gap:var(--space-2)">
        <input type="search" name="search" placeholder="{{ _('输入书名、作者...') }}"
               style="flex:1;height:44px;padding:0 var(--space-3);border:1px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-bg-elevated);font-size:var(--text-base);color:var(--color-text-primary);outline:none"
               required autofocus>
        <button type="submit" class="m-btn m-btn-primary" style="min-width:72px">{{ _('搜索') }}</button>
    </div>
</form>

<!-- 热门搜索 -->
<section>
    <h2 class="m-section-title">{{ _('热门搜索') }}</h2>
    <div style="display:flex;flex-wrap:wrap;gap:var(--space-2);padding:0 var(--space-4)">
        {% for kw in ['百年孤独', '三体', '小王子', '人类简史', '原子习惯', '置身事内'] %}
        <a href="/?search={{ kw | urlencode }}" class="m-card" data-href="/?search={{ kw | urlencode }}"
           style="padding:6px 12px;border-radius:var(--radius-full);font-size:var(--text-sm);color:var(--color-text-primary)">{{ kw }}</a>
        {% endfor %}
    </div>
</section>

{% endblock %}
