[tool.ruff]
target-version = "py313"
line-length = 120

[tool.ruff.lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "N",
    "UP",
    "B",
    "SIM",
    "TCH",
    "RUF",
]
ignore = [
    "E501",
    "E402",
    "RUF001",
    "RUF002",
    "RUF003",
    "RUF012",
    "RUF013",
    "N806",
    "N818",
    "B904",
    "SIM105",
]

[tool.ruff.lint.per-file-ignores]
"app/routes/api/__init__.py" = ["F401"]
"app/models/schemas.py" = ["F401"]
"tests/*" = ["N803", "F841", "RUF059", "SIM117", "B011"]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.format]
quote-style = "single"

[tool.mypy]
python_version = "3.13"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true

[[tool.mypy.overrides]]
module = [
    "flask.*",
    "flask_sqlalchemy.*",
    "flask_cors.*",
    "flask_migrate.*",
    "flask_mail.*",
    "apscheduler.*",
    "mistune.*",
    "bs4.*",
    "tenacity.*",
    "zhipuai.*",
    "deep_translator.*",
    "fpdf.*",
    "openpyxl.*",
    "PIL.*",
    "werkzeug.*",
    "dotenv.*",
    "flask_babel.*",
    "crawl4ai.*",
    "psutil.*",
]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
    "app.models.schemas",
    "app.models.new_book",
    "app.models.book",
]
disable_error_code = [
    "attr-defined",
    "union-attr",
    "operator",
    "arg-type",
    "assignment",
    "name-defined",
    "no-any-return",
]

[[tool.mypy.overrides]]
module = [
    "app.services.new_book_service",
    "app.services.award_book_service",
    "app.services.award_cover_sync_service",
    "app.services.book_verification_service",
    "app.services.translation_cache_service",
    "app.services.weekly_report_service",
    "app.services.book_service",
    "app.services.api_cache_service",
    "app.services.google_books_client",
    "app.services.zhipu_translation_service",
    "app.services.nyt_client",
    "app.services.open_library_client",
    "app.services.recommendation_service",
    "app.services.free_translation_service",
    "app.services.book_language_pack",
    "app.services.api_utils",
    "app.services.publisher_crawler.*",
    "app.routes.admin",
    "app.routes.main",
    "app.routes.api.*",
    "app.routes.analytics_bp",
    "app.routes.health",
    "app.routes.new_books",
    "app.routes.public_api",
    "app.tasks.weekly_report_task",
    "app.utils.error_tracker",
    "app.utils.security",
    "app.utils.service_helpers",
    "app.utils.api_helpers",
    "app.services.new_book.*",
    "app.services.book_detail_service",
    "app.utils.book_filters",
    "app.utils.date_helpers",
]
disable_error_code = [
    "attr-defined",
    "union-attr",
    "no-any-return",
    "arg-type",
    "operator",
    "assignment",
    "name-defined",
    "var-annotated",
    "has-type",
    "call-overload",
    "misc",
    "call-arg",
    "return",
]
