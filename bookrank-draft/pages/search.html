<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookRank 书榜 — 搜索</title>
    <style id="theme-vars">
/* BookRank 书榜 — Brand CSS */
:root {
  --color-primary: #2C5F2D;
  --color-primary-light: #3A7D3B;
  --color-primary-dark: #1E4320;
  --color-primary-tint: #E8F0E8;
  --color-accent: #E67E22;
  --color-accent-light: #F0923A;
  --color-accent-dark: #C96A15;
  --color-accent-tint: #FEF3E6;
  --color-bg: #FAF6F0;
  --color-bg-elevated: #FFFFFF;
  --color-bg-sunken: #F0EBE3;
  --color-text-primary: #333333;
  --color-text-secondary: #666666;
  --color-text-tertiary: #999999;
  --color-text-inverse: #FFFFFF;
  --color-border: #E8E2D8;
  --color-border-light: #F0EBE3;
  --color-state-success: #2C5F2D;
  --color-state-warning: #E67E22;
  --color-state-error: #C0392B;
  --color-state-info: #2980B9;
  --font-display: "Source Han Serif SC", "Noto Serif SC", "SimSun", Georgia, serif;
  --font-body: "Source Han Sans SC", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
  --text-xs: 10px; --text-sm: 12px; --text-base: 14px; --text-lg: 16px;
  --text-xl: 18px; --text-2xl: 20px; --text-3xl: 24px; --text-4xl: 28px;
  --leading-tight: 1.4; --leading-normal: 1.5; --leading-relaxed: 1.6;
  --space-0: 0px; --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
  --space-5: 20px; --space-6: 24px; --space-8: 32px; --space-10: 40px; --space-12: 48px;
  --radius-sm: 4px; --radius-md: 8px; --radius-lg: 12px; --radius-xl: 16px; --radius-full: 9999px;
  --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.08);
  --shadow-card-hover: 0 4px 16px rgba(0, 0, 0, 0.12);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.15);
  --shadow-subtle: 0 1px 3px rgba(0, 0, 0, 0.04);
  --touch-min: 44px; --btn-height: 44px; --input-height: 44px;
  --safe-top: 44px; --safe-bottom: 34px; --tab-height: 50px;
}
.dark {
  --color-primary: #4CAF50; --color-primary-light: #66BB6A;
  --color-primary-dark: #388E3C; --color-primary-tint: #1B2E1C;
  --color-accent: #F0923A; --color-accent-light: #FFB74D;
  --color-accent-dark: #E67E22; --color-accent-tint: #2E1F0E;
  --color-bg: #1A1A1A; --color-bg-elevated: #242424; --color-bg-sunken: #141414;
  --color-text-primary: #E8E2D8; --color-text-secondary: #AAAAAA;
  --color-text-tertiary: #777777; --color-text-inverse: #1A1A1A;
  --color-border: #333333; --color-border-light: #2A2A2A;
  --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.25);
  --shadow-card-hover: 0 4px 16px rgba(0, 0, 0, 0.35);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.45);
  --shadow-subtle: 0 1px 3px rgba(0, 0, 0, 0.15);
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-accent: var(--color-accent);
    --color-border: var(--color-border);
  }
    </style>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: var(--font-body);
        background-color: var(--color-bg);
        color: var(--color-text-primary);
        -webkit-font-smoothing: antialiased;
        padding-bottom: calc(var(--tab-height) + var(--safe-bottom) + 16px);
      }

      /* 顶部导航栏 + 搜索框 */
      .top-nav {
        height: 56px;
        background-color: var(--color-bg-elevated);
        border-bottom: 1px solid var(--color-border-light);
        display: flex;
        align-items: center;
        padding: 0 16px;
        gap: 12px;
        position: sticky;
        top: 0;
        z-index: 50;
      }

      .search-input-wrap {
        flex: 1;
        height: 36px;
        background-color: var(--color-bg);
        border-radius: var(--radius-full);
        display: flex;
        align-items: center;
        padding: 0 12px;
        gap: 8px;
      }

      .search-input-wrap input {
        flex: 1;
        border: none;
        outline: none;
        background: transparent;
        font-size: var(--text-base);
        color: var(--color-text-primary);
        font-family: var(--font-body);
      }

      .search-input-wrap input::placeholder {
        color: var(--color-text-tertiary);
      }

      .cancel-btn {
        color: var(--color-primary);
        font-size: var(--text-base);
        cursor: pointer;
        white-space: nowrap;
        background: none;
        border: none;
        font-family: var(--font-body);
      }

      /* 热门搜索 */
      .hot-section {
        margin-top: 24px;
        padding: 0 16px;
      }

      .section-title {
        font-family: var(--font-display);
        font-size: 16px;
        color: var(--color-text-primary);
      }

      .hot-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .hot-tag {
        background-color: var(--color-bg-elevated);
        color: var(--color-text-secondary);
        border-radius: var(--radius-full);
        padding: 6px 16px;
        font-size: 12px;
        box-shadow: var(--shadow-subtle);
        cursor: pointer;
        border: none;
        font-family: var(--font-body);
        line-height: 1.4;
      }

      .hot-tag.featured {
        font-size: 16px;
        color: var(--color-primary);
      }

      /* 搜索历史 */
      .history-section {
        margin-top: 32px;
        padding: 0 16px;
      }

      .history-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .history-clear {
        color: var(--color-text-tertiary);
        font-size: var(--text-sm);
        cursor: pointer;
        background: none;
        border: none;
        font-family: var(--font-body);
      }

      .history-item {
        display: flex;
        align-items: center;
        padding: 12px 0;
        border-bottom: 1px solid var(--color-border-light);
        gap: 8px;
      }

      .history-item:last-child { border-bottom: none; }

      .history-item .htext {
        flex: 1;
        font-size: 14px;
        color: var(--color-text-secondary);
      }

      .history-item .hdel {
        color: var(--color-text-tertiary);
        cursor: pointer;
        background: none;
        border: none;
        display: flex;
        align-items: center;
        padding: 4px;
      }

      /* 底部导航栏 — 按规范实现 */
      .tab-bar {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        background-color: var(--color-bg-elevated);
        border-top: 1px solid var(--color-border-light);
        display: flex;
        justify-content: space-around;
        height: var(--tab-height);
        padding-bottom: var(--safe-bottom);
        z-index: 100;
      }

      .tab-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        color: var(--color-text-tertiary);
        font-size: 10px;
        gap: 2px;
        flex: 1;
        min-height: 44px;
      }

      .tab-item.active {
        color: var(--color-primary);
        font-weight: 600;
      }

      .tab-item svg {
        width: 24px; height: 24px;
      }

      .tab-item.active svg {
        color: var(--color-primary);
      }

      .tab-item[data-dom-id="tab-home"] svg {
        width: 28px; height: 28px;
      }
    </style>
</head>
<body>

  <!-- 顶部导航栏（含搜索框） -->
  <div class="top-nav">
    <div class="search-input-wrap">
      <i data-lucide="search" style="width:16px;height:16px;color:var(--color-text-tertiary);flex-shrink:0;"></i>
      <input type="text" placeholder="搜索书籍、作者、ISBN..." />
    </div>
    <button class="cancel-btn">取消</button>
  </div>

  <!-- 热门搜索 -->
  <div class="hot-section">
    <div class="section-title">热门搜索</div>
    <div class="hot-tags">
      <button class="hot-tag featured">三体</button>
      <button class="hot-tag">小王子</button>
      <button class="hot-tag">哈利波特</button>
      <button class="hot-tag">百年孤独</button>
      <button class="hot-tag">活着</button>
      <button class="hot-tag">围城</button>
      <button class="hot-tag">人类简史</button>
      <button class="hot-tag">三体II</button>
      <button class="hot-tag">追风筝的人</button>
      <button class="hot-tag">挪威的森林</button>
    </div>
  </div>

  <!-- 搜索历史 -->
  <div class="history-section">
    <div class="history-header">
      <div class="section-title">搜索历史</div>
      <button class="history-clear">清空</button>
    </div>
    <div class="history-list">
      <div class="history-item">
        <i data-lucide="clock" style="width:14px;height:14px;color:var(--color-text-tertiary);flex-shrink:0;"></i>
        <span class="htext">三体</span>
        <button class="hdel"><i data-lucide="x" style="width:14px;height:14px;"></i></button>
      </div>
      <div class="history-item">
        <i data-lucide="clock" style="width:14px;height:14px;color:var(--color-text-tertiary);flex-shrink:0;"></i>
        <span class="htext">百年孤独</span>
        <button class="hdel"><i data-lucide="x" style="width:14px;height:14px;"></i></button>
      </div>
      <div class="history-item">
        <i data-lucide="clock" style="width:14px;height:14px;color:var(--color-text-tertiary);flex-shrink:0;"></i>
        <span class="htext">村上春树</span>
        <button class="hdel"><i data-lucide="x" style="width:14px;height:14px;"></i></button>
      </div>
      <div class="history-item">
        <i data-lucide="clock" style="width:14px;height:14px;color:var(--color-text-tertiary);flex-shrink:0;"></i>
        <span class="htext">余华</span>
        <button class="hdel"><i data-lucide="x" style="width:14px;height:14px;"></i></button>
      </div>
    </div>
  </div>

  <!-- 底部导航栏 -->
  <nav class="tab-bar">
    <a class="tab-item" data-dom-id="tab-home" href="#">
      <i data-lucide="house"></i>
      <span>首页</span>
    </a>
    <a class="tab-item active" data-dom-id="tab-search" href="#">
      <i data-lucide="search"></i>
      <span>搜索</span>
    </a>
    <a class="tab-item" data-dom-id="tab-weekly-report" href="#">
      <i data-lucide="file-text"></i>
      <span>周报</span>
    </a>
    <a class="tab-item" data-dom-id="tab-profile" href="#">
      <i data-lucide="user"></i>
      <span>我的</span>
    </a>
  </nav>

  <script>lucide.createIcons();</script>
</body>
</html>
