    <style>
      /* 页面基础 */
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html { -webkit-tap-highlight-color: transparent; }
      body {
        font-family: var(--font-body);
        background-color: var(--color-bg);
        color: var(--color-text-primary);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* 隐藏滚动条 */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      /* 顶部导航栏 */
      .nav-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 50;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        background-color: var(--color-bg-elevated);
        border-bottom: 1px solid var(--color-border);
      }
      .nav-back {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 44px;
        color: var(--color-text-primary);
        text-decoration: none;
        cursor: pointer;
        border: none;
        background: none;
        padding: 0;
      }
      .nav-title {
        font-family: var(--font-display);
        font-size: 16px;
        font-weight: 700;
        color: var(--color-text-primary);
        text-align: center;
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .nav-spacer { width: 44px; }

      /* 奖项分类标签栏 */
      .category-tabs {
        position: fixed;
        top: 56px;
        left: 0;
        right: 0;
        z-index: 40;
        background-color: var(--color-bg-elevated);
        border-bottom: 1px solid var(--color-border-light);
      }
      .category-tabs-inner {
        display: flex;
        overflow-x: auto;
        white-space: nowrap;
        padding: 0 16px;
        gap: 0;
        scrollbar-width: none;
      }
      .category-tabs-inner::-webkit-scrollbar { display: none; }
      .category-tab {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 16px;
        font-size: 14px;
        color: var(--color-text-tertiary);
        text-decoration: none;
        cursor: pointer;
        border: none;
        background: none;
        position: relative;
        white-space: nowrap;
        flex-shrink: 0;
        transition: color 0.2s;
      }
      .category-tab.active {
        color: var(--color-primary);
        font-weight: 600;
      }
      .category-tab.active::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 24px;
        height: 2px;
        background-color: var(--color-primary);
        border-radius: 1px;
      }

      /* 书籍卡片列表 */
      .book-list {
        padding: 0 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .book-card {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        background-color: var(--color-bg-elevated);
        border-radius: var(--radius-lg);
        padding: 12px;
        box-shadow: var(--shadow-card);
        text-decoration: none;
        color: inherit;
        transition: box-shadow 0.15s, transform 0.15s;
        cursor: pointer;
      }
      .book-card:active {
        transform: scale(0.98);
        box-shadow: var(--shadow-subtle);
      }

      /* 排名数字 */
      .rank-num {
        flex-shrink: 0;
        width: 28px;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding-top: 2px;
        font-family: var(--font-display);
      }
      .rank-top {
        font-size: 24px;
        font-weight: 700;
        color: var(--color-primary);
        line-height: 1;
      }
      .rank-normal {
        font-size: 14px;
        font-weight: 500;
        color: var(--color-text-tertiary);
        line-height: 1;
      }

      /* 书籍封面 */
      .book-cover {
        flex-shrink: 0;
        width: 60px;
        height: 80px;
        border-radius: 6px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, var(--color-primary-tint), var(--color-bg-sunken));
      }
      .book-cover-icon {
        color: var(--color-primary);
        opacity: 0.5;
      }

      /* 书籍信息 */
      .book-info {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
      }
      .book-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--color-text-primary);
        line-height: var(--leading-tight);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .book-author {
        font-size: 12px;
        color: var(--color-text-secondary);
        line-height: var(--leading-normal);
        margin-top: 4px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .badge-row {
        display: flex;
        align-items: center;
        gap: 4px;
        margin-top: 8px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 1px 6px;
        border-radius: var(--radius-full);
        font-size: 10px;
        line-height: 1.5;
        white-space: nowrap;
        font-weight: 500;
      }
      .badge-award {
        background-color: var(--color-primary);
        color: var(--color-text-inverse);
      }
      .badge-year {
        background-color: var(--color-accent);
        color: var(--color-text-inverse);
      }

      /* 分页器 */

        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 24px 16px 32px;
      }
      .page-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 8px 16px;
        font-size: 14px;
        color: var(--color-primary);
        background: none;
        border: none;
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: background-color 0.15s;
        font-family: var(--font-body);

      .page-btn:active {

      }
      .page-btn.disabled {
        color: var(--color-text-tertiary);
        cursor: not-allowed;
        pointer-events: none;
      }
      .page-btn.current {
        background-color: var(--color-primary-tint);
        border-radius: var(--radius-md);
        font-weight: 500;
      }
      .page-indicator {
        font-size: 14px;
        color: var(--color-text-secondary);
        min-height: 44px;
        display: flex;
        align-items: center;
        padding: 0 4px;
      }

    <script>
      // 初始化 Lucide 图标
      lucide.createIcons();

      // 当前页码状态
      let currentPage = 1;
      const totalPages = 2;

      // 切换页面
      function changePage(delta) {
        var newPage = currentPage + delta;
        if (newPage < 1 || newPage > totalPages) return;
        currentPage = newPage;
        renderPage();
      }

      // 渲染页面状态
      function renderPage() {
        // 切换书籍列表可见性
        document.getElementById('page-1').style.display = currentPage === 1 ? '' : 'none';
        document.getElementById('page-2').style.display = currentPage === 2 ? '' : 'none';

        // 更新页码文字
        document.getElementById('page-text').textContent = currentPage + ' / ' + totalPages;

        // 更新按钮状态
        var btnPrev = document.getElementById('btn-prev');
        var btnNext = document.getElementById('btn-next');
        if (currentPage <= 1) {
          btnPrev.classList.add('disabled');
        } else {
          btnPrev.classList.remove('disabled');
        }
        if (currentPage >= totalPages) {
          btnNext.classList.add('disabled');
        } else {
          btnNext.classList.remove('disabled');
        }

        // 滚动到顶部
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      // 奖项标签切换
      document.querySelectorAll('.category-tab').forEach(function(tab) {
        tab.addEventListener('click', function() {
          document.querySelectorAll('.category-tab').forEach(function(t) {
            t.classList.remove('active');
          });
          this.classList.add('active');
          // 切换回第一页
          currentPage = 1;
          renderPage();
        });
      });
    </script>
</body>
</html>
