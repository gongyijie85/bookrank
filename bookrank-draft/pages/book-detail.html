<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>BookRank — 书籍详情</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
  <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --color-primary: #2C5F2D;
      --color-primary-light: #3A7D3B;
      --color-primary-dark: #1E4320;
      --color-primary-tint: #E8F0E8;
      --color-accent: #E67E22;
      --color-accent-light: #F0923A;
      --color-accent-dark: #C96A15;
      --color-accent-tint: #FEF3E6;
      --color-bg: #FAF6F0;
      --color-bg-elevated: #FFFFFF;
      --color-bg-sunken: #F0EBE3;
      --color-text-primary: #333333;
      --color-text-secondary: #666666;
      --color-text-tertiary: #999999;
      --color-text-inverse: #FFFFFF;
      --color-border: #E8E2D8;
      --color-border-light: #F0EBE3;
      --color-state-success: #2C5F2D;
      --color-state-warning: #E67E22;
      --color-state-error: #C0392B;
      --color-state-info: #2980B9;
      --font-display: "Source Han Serif SC", "Noto Serif SC", "SimSun", Georgia, serif;
      --font-body: "Source Han Sans SC", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      --text-xs: 10px;
      --text-sm: 12px;
      --text-base: 14px;
      --text-lg: 16px;
      --text-xl: 18px;
      --text-2xl: 20px;
      --text-3xl: 24px;
      --text-4xl: 28px;
      --leading-tight: 1.4;
      --leading-normal: 1.5;
      --leading-relaxed: 1.6;
      --space-0: 0px;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --space-10: 40px;
      --space-12: 48px;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --radius-full: 9999px;
      --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.08);
      --shadow-card-hover: 0 4px 16px rgba(0, 0, 0, 0.12);
      --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.15);
      --shadow-subtle: 0 1px 3px rgba(0, 0, 0, 0.04);
      --touch-min: 44px;
      --btn-height: 44px;
      --input-height: 44px;
      --safe-top: 44px;
      --safe-bottom: 34px;
      --tab-height: 50px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--color-bg);
      color: var(--color-text-primary);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
    }

    /* 顶部导航栏 */
    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      height: 56px;
      background: var(--color-bg-elevated);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      padding: 0 var(--space-4);
    }

    .top-nav__back {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: var(--touch-min);
      height: var(--touch-min);
      color: var(--color-text-primary);
      cursor: pointer;
    }

    .top-nav__title {
      flex: 1;
      text-align: center;
      font-family: var(--font-display);
      font-size: var(--text-lg);
      font-weight: 600;
      color: var(--color-text-primary);
    }

    .top-nav__right {
      width: var(--touch-min);
    }

    /* 封面区域 */
    .cover-area {
      position: relative;
      display: flex;
      justify-content: center;
      padding-top: var(--space-8);
      padding-bottom: var(--space-10);
      background: var(--color-bg-elevated);
    }

    .cover-area__image {
      position: relative;
      z-index: 2;
      width: 120px;
      height: 170px;
      object-fit: cover;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-float);
    }

    .cover-area__gradient {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 48px;
      background: linear-gradient(to bottom, var(--color-bg-elevated) 0%, var(--color-bg) 100%);
      z-index: 3;
      pointer-events: none;
    }

    /* 书名区域 */
    .book-info {
      text-align: center;
      padding: 0 var(--space-6);
      margin-top: var(--space-2);
    }

    .book-info__title {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      font-weight: 700;
      color: var(--color-text-primary);
      line-height: var(--leading-tight);
      word-break: keep-all;
      overflow-wrap: break-word;
      text-wrap: balance;
    }

    .book-info__author {
      font-size: var(--text-base);
      color: var(--color-text-secondary);
      margin-top: var(--space-4);
    }

    /* 评分 */
    .rating {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: var(--space-5);
      gap: var(--space-2);
    }

    .rating__score {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 700;
      color: var(--color-accent);
      line-height: 1;
    }

    .rating__star {
      color: var(--color-accent);
    }

    .rating__star svg {
      width: 16px;
      height: 16px;
      fill: var(--color-accent);
    }

    /* 标签 */
    .tags {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--space-2);
      margin-top: var(--space-5);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
      background: var(--color-primary-tint);
      color: var(--color-primary);
      border-radius: var(--radius-full);
      padding: 2px 8px;
      font-size: var(--text-sm);
      line-height: var(--leading-normal);
    }

    /* 通用内容区段 */
    .section {
      padding: 0 var(--space-6);
    }

    .section + .section {
      margin-top: var(--space-8);
    }

    .section__title {
      font-family: var(--font-display);
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--color-text-primary);
      margin-bottom: var(--space-4);
    }

    /* 内容简介 */
    .synopsis__text {
      font-size: 15px;
      line-height: 1.8;
      color: var(--color-text-secondary);
      text-align: justify;
    }

    /* 详细信息 - 单列列表 */
    .detail-list {
      width: 100%;
    }

    .detail-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-3) 0;
      border-bottom: 1px solid var(--color-border-light);
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-row__label {
      font-size: var(--text-base);
      color: var(--color-text-tertiary);
      flex-shrink: 0;
    }

    .detail-row__value {
      font-size: var(--text-base);
      color: var(--color-text-primary);
      text-align: right;
      margin-left: var(--space-4);
      word-break: break-all;
    }

    .copy-btn {
      display: inline-flex;
      align-items: center;
      background: var(--color-primary-tint);
      color: var(--color-primary);
      border-radius: var(--radius-full);
      padding: 2px 8px;
      font-size: var(--text-sm);
      line-height: var(--leading-normal);
      cursor: pointer;
      border: none;
      margin-left: var(--space-2);
      vertical-align: middle;
      white-space: nowrap;
    }

    .copy-btn:active {
      opacity: 0.7;
    }

    /* 底部操作栏 */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 50;
      background: var(--color-bg-elevated);
      border-top: 1px solid var(--color-border);
      padding: var(--space-3) var(--space-4);
      padding-bottom: calc(var(--space-3) + var(--safe-bottom));
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .btn-back {
      flex: 1;
      height: var(--btn-height);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      color: var(--color-primary);
      border: 1.5px solid var(--color-primary);
      border-radius: var(--radius-md);
      font-size: var(--text-base);
      font-weight: 600;
      font-family: var(--font-body);
      cursor: pointer;
      transition: background 120ms ease;
    }

    .btn-back:active {
      background: var(--color-primary-tint);
    }

    .btn-want {
      flex: 1;
      height: var(--btn-height);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--color-accent);
      color: var(--color-text-inverse);
      border: none;
      border-radius: var(--radius-md);
      font-size: var(--text-base);
      font-weight: 600;
      font-family: var(--font-body);
      cursor: pointer;
      transition: background 120ms ease;
    }

    .btn-want:active {
      background: var(--color-accent-dark);
    }
  </style>
</head>
<body>
  <!-- 顶部导航栏 -->
  <nav class="top-nav">
    <a class="top-nav__back" data-dom-id="back-ranking" href="#" aria-label="返回榜单">
      <i data-lucide="arrow-left" style="width:20px;height:20px;"></i>
    </a>
    <span class="top-nav__title">书籍详情</span>
    <div class="top-nav__right"></div>
  </nav>

  <!-- 主内容区域 -->
  <main>
    <!-- 顶部安全区占位 -->
    <div style="height: var(--safe-top);"></div>

    <!-- 封面区域 + 渐变过渡 -->
    <div class="cover-area">
      <img
        class="cover-area__image"
        src="../assets/book-cover.jpg"
        alt="百年孤独 封面"
        onerror="this.style.background='var(--color-bg-sunken)'; this.style.display='flex'; this.alt='封面加载失败';"
      >
      <div class="cover-area__gradient"></div>
    </div>

    <!-- 书名信息 -->
    <section class="book-info">
      <h1 class="book-info__title">百年孤独</h1>
      <p class="book-info__author">加西亚·马尔克斯 著 / 范晔 译</p>

      <!-- 评分 -->
      <div class="rating">
        <span class="rating__score">9.3</span>
        <span class="rating__star">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" stroke="none">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
        </span>
      </div>

      <!-- 标签 -->
      <div class="tags">
        <span class="tag">小说</span>
        <span class="tag">文学</span>
        <span class="tag">经典</span>
      </div>
    </section>

    <!-- 内容简介 -->
    <section class="section" style="margin-top: var(--space-8);">
      <h2 class="section__title">内容简介</h2>
      <p class="synopsis__text">
        《百年孤独》是哥伦比亚作家加西亚·马尔克斯的代表作，也是拉丁美洲魔幻现实主义文学的代表作，被誉为"再现拉丁美洲历史社会图景的鸿篇巨著"。作品描写了布恩迪亚家族七代人的传奇故事，以及加勒比海沿岸小镇马孔多的百年兴衰，反映了拉丁美洲一个世纪以来风云变幻的历史。
      </p>
    </section>

    <!-- 详细信息 - 单列列表 -->
    <section class="section" style="margin-top: var(--space-8);">
      <h2 class="section__title">详细信息</h2>
      <div class="detail-list">
        <div class="detail-row">
          <span class="detail-row__label">出版社</span>
          <span class="detail-row__value">南海出版公司</span>
        </div>
        <div class="detail-row">
          <span class="detail-row__label">出版时间</span>
          <span class="detail-row__value">2011年6月</span>
        </div>
        <div class="detail-row">
          <span class="detail-row__label">页数</span>
          <span class="detail-row__value">360页</span>
        </div>
        <div class="detail-row">
          <span class="detail-row__label">语言</span>
          <span class="detail-row__value">中文</span>
        </div>
        <div class="detail-row">
          <span class="detail-row__label">ISBN</span>
          <span class="detail-row__value">
            9787544253994
            <button class="copy-btn" type="button" onclick="navigator.clipboard.writeText('9787544253994').then(()=>this.textContent='已复制')">复制</button>
          </span>
        </div>
      </div>
    </section>

    <!-- 底部安全区留白（避免内容被底部栏遮挡） -->
    <div style="height: calc(var(--btn-height) + var(--safe-bottom) + var(--space-8));"></div>
  </main>

  <!-- 底部操作栏 -->
  <footer class="bottom-bar">
    <button class="btn-back" data-dom-id="back-ranking" type="button">返回榜单</button>
    <button class="btn-want" type="button">想读</button>
  </footer>

  <script>
    lucide.createIcons();
  </script>
</body>
</html>
