<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookRank 书榜 — 周报详情</title>
    <style id="theme-vars">
:root {
  --color-primary: #2C5F2D;
  --color-primary-light: #3A7D3B;
  --color-primary-dark: #1E4320;
  --color-primary-tint: #E8F0E8;
  --color-accent: #E67E22;
  --color-accent-light: #F0923A;
  --color-accent-dark: #C96A15;
  --color-accent-tint: #FEF3E6;
  --color-bg: #FAF6F0;
  --color-bg-elevated: #FFFFFF;
  --color-bg-sunken: #F0EBE3;
  --color-text-primary: #333333;
  --color-text-secondary: #666666;
  --color-text-tertiary: #999999;
  --color-text-inverse: #FFFFFF;
  --color-border: #E8E2D8;
  --color-border-light: #F0EBE3;
  --color-state-success: #2C5F2D;
  --color-state-warning: #E67E22;
  --color-state-error: #C0392B;
  --color-state-info: #2980B9;
  --font-display: "Source Han Serif SC", "Noto Serif SC", "SimSun", Georgia, serif;
  --font-body: "Source Han Sans SC", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
  --text-xs: 10px; --text-sm: 12px; --text-base: 14px; --text-lg: 16px;
  --text-xl: 18px; --text-2xl: 20px; --text-3xl: 24px; --text-4xl: 28px;
  --leading-tight: 1.4; --leading-normal: 1.5; --leading-relaxed: 1.6;
  --space-0: 0px; --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
  --space-5: 20px; --space-6: 24px; --space-8: 32px; --space-10: 40px; --space-12: 48px;
  --radius-sm: 4px; --radius-md: 8px; --radius-lg: 12px; --radius-xl: 16px; --radius-full: 9999px;
  --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.08);
  --shadow-card-hover: 0 4px 16px rgba(0, 0, 0, 0.12);
  --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.15);
  --shadow-subtle: 0 1px 3px rgba(0, 0, 0, 0.04);
  --touch-min: 44px; --btn-height: 44px; --input-height: 44px;
  --safe-top: 44px; --safe-bottom: 34px; --tab-height: 50px;
}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style>
      body { background: var(--color-bg); color: var(--color-text-primary); }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      /* 推荐语气泡三角形 */
      .bubble::before {
        content: '';
        position: absolute;
        left: 8px;
        top: -6px;
        width: 0;
        height: 0;
        border-left: 6px solid transparent;
        border-right: 6px solid transparent;
        border-bottom: 6px solid var(--color-accent-tint);
      }
    </style>
</head>
<body>
  <!-- Safe Top Spacer -->
  <div style="height: var(--safe-top);"></div>

  <!-- Top Nav Bar -->
  <nav class="sticky top-0 z-40 flex items-center h-[56px] px-4 border-b" style="background: var(--color-bg-elevated); border-color: var(--color-border);">
    <a href="weekly-report-list.html" class="flex items-center justify-center" style="min-width: var(--touch-min); min-height: var(--touch-min);">
      <i data-lucide="arrow-left" style="width: 20px; height: 20px; color: var(--color-text-primary);"></i>
    </a>
    <span class="flex-1 text-center text-[16px]" style="font-family: var(--font-display); color: var(--color-text-primary); margin-right: 44px;">周报详情</span>
  </nav>

  <!-- Main Content -->
  <main class="no-scrollbar pb-[calc(var(--tab-height)+var(--safe-bottom)+16px)]" style="overflow-y: auto;">

    <!-- Hero Section -->
    <section style="background: linear-gradient(135deg, var(--color-primary), var(--color-primary-light)); padding: 24px 16px; border-radius: 0 0 24px 24px;">
      <h1 class="text-[18px] font-bold" style="font-family: var(--font-display); color: var(--color-text-inverse);">2025年6月第3周周报</h1>
      <p class="text-[12px] mt-1" style="color: rgba(255,255,255,0.7);">6.17 - 6.23</p>
    </section>

    <!-- Stats Cards (4 columns) -->
    <section class="mx-4 -mt-4 rounded-[var(--radius-lg)] p-4" style="background: var(--color-bg-elevated); box-shadow: var(--shadow-card); position: relative; z-index: 1;">
      <div class="grid grid-cols-4 gap-2 text-center">
        <!-- 新增书籍 -->
        <div class="flex flex-col items-center">
          <span class="text-[24px] font-bold leading-none" style="font-family: var(--font-display); color: var(--color-primary);">12</span>
          <span class="text-[10px] mt-1 whitespace-nowrap" style="color: var(--color-text-tertiary);">新增书籍</span>
        </div>
        <!-- 榜单更新 -->
        <div class="flex flex-col items-center">
          <span class="text-[24px] font-bold leading-none" style="font-family: var(--font-display); color: var(--color-primary);">5</span>
          <span class="text-[10px] mt-1 whitespace-nowrap" style="color: var(--color-text-tertiary);">榜单更新</span>
        </div>
        <!-- 推荐书籍 -->
        <div class="flex flex-col items-center">
          <span class="text-[24px] font-bold leading-none" style="font-family: var(--font-display); color: var(--color-primary);">8</span>
          <span class="text-[10px] mt-1 whitespace-nowrap" style="color: var(--color-text-tertiary);">推荐书籍</span>
        </div>
        <!-- 排名变化 -->
        <div class="flex flex-col items-center">
          <span class="text-[24px] font-bold leading-none" style="font-family: var(--font-display); color: var(--color-primary);">3</span>
          <span class="text-[10px] mt-1 whitespace-nowrap" style="color: var(--color-text-tertiary);">排名变化</span>
        </div>
      </div>
    </section>

    <!-- Section: 榜单变化 -->
    <section class="px-4" style="margin-top: 32px;">
      <h2 class="text-[16px] font-bold" style="font-family: var(--font-display); color: var(--color-text-primary);">榜单变化</h2>

      <div class="mt-2">
        <!-- UP 3 -->
        <div class="flex items-center gap-2 py-3" style="border-bottom: 1px solid var(--color-border);">
          <i data-lucide="arrow-up" class="shrink-0" style="width: 16px; height: 16px; color: #2C5F2D;"></i>
          <span class="text-[13px] truncate" style="color: var(--color-text-primary);">《百年孤独》上升3名</span>
        </div>
        <!-- DOWN 2 -->
        <div class="flex items-center gap-2 py-3" style="border-bottom: 1px solid var(--color-border);">
          <i data-lucide="arrow-down" class="shrink-0" style="width: 16px; height: 16px; color: #C0392B;"></i>
          <span class="text-[13px] truncate" style="color: var(--color-text-primary);">《三体》下降2名</span>
        </div>
        <!-- UP 5 -->
        <div class="flex items-center gap-2 py-3" style="border-bottom: 1px solid var(--color-border);">
          <i data-lucide="arrow-up" class="shrink-0" style="width: 16px; height: 16px; color: #2C5F2D;"></i>
          <span class="text-[13px] truncate" style="color: var(--color-text-primary);">《人类简史》上升5名</span>
        </div>
        <!-- DOWN 1 -->
        <div class="flex items-center gap-2 py-3">
          <i data-lucide="arrow-down" class="shrink-0" style="width: 16px; height: 16px; color: #C0392B;"></i>
          <span class="text-[13px] truncate" style="color: var(--color-text-primary);">《活着》下降1名</span>
        </div>
      </div>
    </section>

    <!-- Section: 本周推荐 -->
    <section class="px-4" style="margin-top: 32px;">
      <h2 class="text-[16px] font-bold" style="font-family: var(--font-display); color: var(--color-text-primary);">本周推荐</h2>

      <!-- Book Card 1: 百年孤独 -->
      <div class="mt-3 rounded-[var(--radius-lg)] p-3 flex flex-row gap-3" style="background: var(--color-bg-elevated); box-shadow: var(--shadow-card);">
        <!-- Cover -->
        <div class="shrink-0 w-[50px] h-[70px] rounded-[var(--radius-sm)]" style="background: linear-gradient(135deg, var(--color-primary), #4a8c4e);"></div>
        <!-- Info -->
        <div class="flex flex-col min-w-0 flex-1">
          <p class="text-[14px] font-bold truncate" style="color: var(--color-text-primary);">百年孤独</p>
          <p class="text-[12px] mt-0.5 truncate" style="color: var(--color-text-secondary);">加西亚·马尔克斯</p>
          <!-- Recommendation Bubble -->
          <div class="relative mt-2 p-2 rounded-[var(--radius-md)]" style="background: var(--color-accent-tint); position: relative;">
            <div class="bubble" style="position: absolute; left: 8px; top: -6px; width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-bottom: 6px solid var(--color-accent-tint);"></div>
            <p class="text-[12px] leading-[1.4]" style="color: var(--color-accent-dark);">魔幻现实主义文学代表作，讲述布恩迪亚家族七代人的传奇故事。</p>
          </div>
        </div>
      </div>

      <!-- Book Card 2: 人类简史 -->
      <div class="mt-3 rounded-[var(--radius-lg)] p-3 flex flex-row gap-3" style="background: var(--color-bg-elevated); box-shadow: var(--shadow-card);">
        <div class="shrink-0 w-[50px] h-[70px] rounded-[var(--radius-sm)]" style="background: linear-gradient(135deg, var(--color-accent), #f0a04b);"></div>
        <div class="flex flex-col min-w-0 flex-1">
          <p class="text-[14px] font-bold truncate" style="color: var(--color-text-primary);">人类简史</p>
          <p class="text-[12px] mt-0.5 truncate" style="color: var(--color-text-secondary);">尤瓦尔·赫拉利</p>
          <div class="relative mt-2 p-2 rounded-[var(--radius-md)]" style="background: var(--color-accent-tint);">
            <div style="position: absolute; left: 8px; top: -6px; width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-bottom: 6px solid var(--color-accent-tint);"></div>
            <p class="text-[12px] leading-[1.4]" style="color: var(--color-accent-dark);">从认知革命到人工智能，重新审视人类发展的宏大历程。</p>
          </div>
        </div>
      </div>

      <!-- Book Card 3: 小王子 -->
      <div class="mt-3 rounded-[var(--radius-lg)] p-3 flex flex-row gap-3" style="background: var(--color-bg-elevated); box-shadow: var(--shadow-card);">
        <div class="shrink-0 w-[50px] h-[70px] rounded-[var(--radius-sm)]" style="background: linear-gradient(135deg, #5b7fa5, #8ab4d4);"></div>
        <div class="flex flex-col min-w-0 flex-1">
          <p class="text-[14px] font-bold truncate" style="color: var(--color-text-primary);">小王子</p>
          <p class="text-[12px] mt-0.5 truncate" style="color: var(--color-text-secondary);">安托万·德·圣-埃克苏佩里</p>
          <div class="relative mt-2 p-2 rounded-[var(--radius-md)]" style="background: var(--color-accent-tint);">
            <div style="position: absolute; left: 8px; top: -6px; width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-bottom: 6px solid var(--color-accent-tint);"></div>
            <p class="text-[12px] leading-[1.4]" style="color: var(--color-accent-dark);">一部写给大人的童话，关于爱、责任与生命本质的哲思。</p>
          </div>
        </div>
      </div>
    </section>

    <!-- Bottom Share Button -->
    <section class="px-4" style="margin-top: 32px;">
      <button data-dom-id="share-report" class="w-full flex items-center justify-center gap-2 rounded-[var(--radius-lg)]" style="height: 48px; background: var(--color-primary); color: var(--color-text-inverse); font-size: 16px; font-weight: bold; border: none; cursor: pointer;">
        <i data-lucide="share-2" style="width: 18px; height: 18px;"></i>
        <span>分享周报</span>
      </button>
    </section>

  </main>

  <!-- Bottom Tab Bar -->
  <nav class="fixed bottom-0 inset-x-0 z-40 border-t" style="background: var(--color-bg-elevated); border-color: var(--color-border); padding-bottom: var(--safe-bottom);">
    <div class="flex items-center justify-around" style="height: var(--tab-height);">
      <!-- Home -->
      <a href="home.html" data-dom-id="tab-home" class="flex flex-col items-center justify-center flex-1 h-full transition-colors" style="color: var(--color-text-tertiary); min-height: var(--touch-min);">
        <i data-lucide="house" style="width: 28px; height: 28px;"></i>
        <span class="text-[10px] mt-0.5">首页</span>
      </a>
      <!-- Search -->
      <a href="search.html" data-dom-id="tab-search" class="flex flex-col items-center justify-center flex-1 h-full transition-colors" style="color: var(--color-text-tertiary); min-height: var(--touch-min);">
        <i data-lucide="search" style="width: 24px; height: 24px;"></i>
        <span class="text-[10px] mt-0.5">搜索</span>
      </a>
      <!-- Weekly Report (Active) -->
      <a href="weekly-report-list.html" data-dom-id="tab-weekly-report" class="flex flex-col items-center justify-center flex-1 h-full transition-colors" style="color: var(--color-primary); min-height: var(--touch-min);">
        <i data-lucide="calendar" style="width: 24px; height: 24px; fill: var(--color-primary);"></i>
        <span class="text-[10px] mt-0.5 font-semibold">周报</span>
      </a>
      <!-- Profile -->
      <a href="profile.html" data-dom-id="tab-profile" class="flex flex-col items-center justify-center flex-1 h-full transition-colors" style="color: var(--color-text-tertiary); min-height: var(--touch-min);">
        <i data-lucide="user" style="width: 24px; height: 24px;"></i>
        <span class="text-[10px] mt-0.5">我的</span>
      </a>
    </div>
  </nav>

  <script>
    lucide.createIcons();
  </script>
</body>
</html>
