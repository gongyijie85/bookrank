services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - FLASK_ENV=development
      - PORT=8000
      - SECRET_KEY=${SECRET_KEY:-docker-dev-secret-key}
      - ADMIN_SECRET=${ADMIN_SECRET:-docker-dev-admin-secret}
      - NYT_API_KEY=${NYT_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY:-}
      - DATABASE_URL=sqlite:////data/bookrank.db
      - CACHE_TYPE=simple
      - WEB_CONCURRENCY=1
      - GUNICORN_THREADS=2
    volumes:
      - bookrank-data:/data
    command: ["gunicorn", "-c", "gunicorn.conf.py", "run:application"]

volumes:
  bookrank-data:
