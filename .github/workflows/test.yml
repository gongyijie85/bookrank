name: Test & Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bookrank
          POSTGRES_PASSWORD: bookrank
          POSTGRES_DB: bookrank_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint check
        run: |
          pip install ruff
          ruff check app/

      - name: Build static assets
        run: python build.py

      - name: Verify build artifacts
        run: |
          test -f static/css/all.min.css && echo "✓ CSS built" || (echo "✗ CSS missing" && exit 1)
          test -f static/js/base.min.js && echo "✓ JS built" || (echo "✗ JS missing" && exit 1)

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://bookrank:bookrank@localhost:5432/bookrank_test
          FLASK_ENV: testing
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=60 \
            --timeout=60 \
            -v

      - name: Upload coverage to Codecov
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
