name: Update Books Data

permissions:
  contents: write

on:
  # 定时执行（每周一凌晨2点）
  schedule:
    - cron: '0 2 * * 1'
  # 手动触发
  workflow_dispatch:

concurrency:
  group: update-books
  cancel-in-progress: true

jobs:
  update-books:
    runs-on: ubuntu-latest
    # v0.9.47：45 → 60 分钟（并行优化后通常 15-20 分钟，留足余量）
    timeout-minutes: 60

    # v0.9.47：升级到 Node.js 24（2026-09-16 强制要求）
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          # v0.9.47：启用 pip 缓存（省 5-8 分钟）
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install crawl4ai

      - name: Install Playwright browsers
        run: |
          npx playwright install --with-deps chromium

      - name: Update books data
        env:
          FLASK_ENV: testing
          SECRET_KEY: ${{ secrets.SECRET_KEY || 'ci-build-only' }}
          DISABLE_BACKGROUND_THREADS: 'true'
          NYT_API_KEY: ${{ secrets.NYT_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python update_books.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add static/data/
          git commit -m 'chore: update books data'
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
