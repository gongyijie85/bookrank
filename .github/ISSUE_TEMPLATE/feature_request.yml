name: 功能请求
description: 提出一个新功能或改进建议
labels: ["needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请说明问题背景与期望方案。
  - type: textarea
    id: problem
    attributes:
      label: 问题/动机
      description: 这个功能解决什么问题？
      placeholder: 例如：目前无法批量导出收藏书单。
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 你希望如何实现？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过哪些替代方案？
  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 任何有助于理解的上下文、截图或参考链接。
  - type: checkboxes
    id: verification
    attributes:
      label: 验收标准
      description: 维护者将根据以下标准判断该功能是否完成。
      options:
        - label: 说明了具体要解决的问题
        - label: 描述了期望的实现方式
        - label: 列出了可验证该功能是否完成的标准
