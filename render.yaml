# Render 部署配置文件
# 免费部署 Flask 应用 + PostgreSQL 数据库
# 文档: https://render.com/docs

services:
  # Web 服务
  - type: web
    name: bookrank
    env: python
    region: oregon
    plan: free
    branch: main
    
    # 构建和启动命令
    buildCommand: pip install -r requirements-prod.txt && python build.py
    startCommand: gunicorn -c gunicorn.conf.py run:application
    
    # 健康检查
    healthCheckPath: /api/health
    
    # 自动部署
    autoDeploy: true
    
    # 环境变量
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: CRON_SECRET
        sync: false
      - key: NYT_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      # 数据库连接（从数据库服务获取）
      - key: DATABASE_URL
        fromDatabase:
          name: bookrank-db
          property: connectionString
      # 缓存配置
      - key: CACHE_TYPE
        value: simple
      - key: CACHE_TTL
        value: "3600"
      # 并发配置
      - key: WEB_CONCURRENCY
        value: "2"
      - key: MAX_WORKERS
        value: "2"

# PostgreSQL 数据库（免费版）
databases:
  - name: bookrank-db
    region: oregon
    plan: free
    # 免费版限制：1GB存储，97行限制
    # 注意：免费数据库会在90天不活跃后删除
