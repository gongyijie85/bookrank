# Render 部署配置文件
# 免费部署 Flask 应用 + PostgreSQL 数据库
# 文档: https://render.com/docs

services:
  # Web 服务
  - type: web
    name: bookrank
    env: python
    region: oregon
    plan: free
    branch: main
    
    # 构建和启动命令
    buildCommand: pip install -r requirements-prod.txt && python build.py
    startCommand: gunicorn -c gunicorn.conf.py run:application
    
    # 健康检查：使用 /health/ready 以验证数据库等真实依赖
    healthCheckPath: /health/ready

    # 自动部署：关闭，改为 CI 成功后通过 Render Deploy Hook 触发
    autoDeploy: false
    
    # 环境变量
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: CRON_SECRET
        sync: false
      - key: NYT_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      # 数据库连接（Supabase / 外部 PostgreSQL）
      # 在 Render Dashboard 中手动设置为 Supabase 的 Session Pooler 或 Direct URL。
      - key: DATABASE_URL
        sync: false
      # 缓存配置
      - key: CACHE_TYPE
        value: simple
      - key: CACHE_TTL
        value: "3600"
      # 并发配置：Render 免费层 512MB 内存，单 worker 避免 OOM
      - key: WEB_CONCURRENCY
        value: "1"
      - key: MAX_WORKERS
        value: "1"

